{% extends "base.html" %}
{% block title %}ASRA &mdash; New Scan{% endblock %}
{% block content %}
  <h1 class="text-xl font-semibold mb-4">Autonomous Security Research Agent</h1>

  {% if error %}
    <p class="mb-4 px-3 py-2 rounded border border-severity-high/40 bg-severity-high/10 text-severity-high break-words">{{ error }}</p>
  {% endif %}

  <form method="post" action="/api/scan" class="bg-surface border border-default rounded-lg p-4 space-y-4">
    <label class="block">
      <span class="block text-sm text-secondary mb-1">Target</span>
      <input type="text" name="target" value="{{ target }}" placeholder="example.com" required
             class="w-full bg-elevated border border-default rounded px-3 py-2 text-primary placeholder:text-secondary focus:outline-none focus:border-accent">
    </label>
    <button type="submit" class="bg-accent hover:bg-accent-hover text-white rounded px-4 py-2 font-medium">Start scan</button>

    <details class="border-t border-default pt-3">
      <summary class="cursor-pointer text-sm text-secondary hover:text-accent">Settings</summary>
      <div class="mt-3 space-y-3">
        <label class="block">
          <span class="block text-sm text-secondary mb-1">Max iterations</span>
          <input type="number" name="max_iterations" min="5" max="40" value="{{ max_iterations_default }}"
                 class="w-full bg-elevated border border-default rounded px-3 py-2 text-primary focus:outline-none focus:border-accent">
        </label>
        <label class="block">
          <span class="block text-sm text-secondary mb-1">LLM Provider</span>
          <select name="llm_provider" class="w-full bg-elevated border border-default rounded px-3 py-2 text-primary focus:outline-none focus:border-accent">
            {% for provider_id in provider_ids %}
              <option value="{{ provider_id }}" {% if provider_id == llm_provider_default %}selected{% endif %}>{{ provider_id }}</option>
            {% endfor %}
          </select>
        </label>
      </div>
    </details>
  </form>
{% endblock %}
