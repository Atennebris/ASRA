{% extends "base.html" %}
{% block title %}ASRA &mdash; Session {{ session.session_id }}{% endblock %}
{% block content %}
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-semibold">Session {{ session.session_id }}</h1>
    <span id="sse-indicator" class="text-xs px-2 py-1 rounded border border-default text-secondary">connecting&hellip;</span>
  </div>

  <div id="session-stream" hx-ext="sse" sse-connect="/api/session/{{ session.session_id }}/stream"
       sse-swap="message" hx-swap="innerHTML">
    {% include "partials/session_fragment.html" %}
  </div>

  <script>
    (function () {
      var stream = document.getElementById("session-stream");
      var indicator = document.getElementById("sse-indicator");
      var wasAtBottom = false;

      stream.addEventListener("htmx:sseOpen", function () {
        indicator.textContent = "live";
        indicator.className = "text-xs px-2 py-1 rounded border border-default text-severity-low";
      });
      stream.addEventListener("htmx:sseError", function () {
        indicator.textContent = "reconnecting…";
        indicator.className = "text-xs px-2 py-1 rounded border border-default text-severity-medium";
      });

      // Only auto-scroll the log if the user was already at the bottom — never yank the view
      // away from someone deliberately scrolled up reading earlier lines.
      stream.addEventListener("htmx:beforeSwap", function () {
        var log = document.getElementById("session-log-list");
        wasAtBottom = !log || log.scrollHeight - log.scrollTop - log.clientHeight < 20;
      });
      stream.addEventListener("htmx:afterSwap", function () {
        if (!wasAtBottom) return;
        var log = document.getElementById("session-log-list");
        if (log) log.scrollTop = log.scrollHeight;
      });
    })();
  </script>
{% endblock %}
